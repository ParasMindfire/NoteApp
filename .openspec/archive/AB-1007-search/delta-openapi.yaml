openapi: "3.1.0"
info:
  title: NoteApp API — AB-1007 delta (Full-Text Search)
  version: "1.7.0"

# Only endpoints and schemas introduced or changed by AB-1007.
# Merge into the base openapi.yaml after this ticket ships.

paths:
  /search:
    get:
      summary: Full-text search own notes, ranked by relevance
      operationId: searchNotes
      tags: [Search]
      security:
        - bearerAuth: []
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
            minLength: 1
          description: >
            Search query. Must be non-empty — returns 400 VALIDATION_FAILED
            if blank. Passed to plainto_tsquery('english', q) for safe FTS
            matching against note title and body text.
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 20
          description: Number of results per page (1–50). Returns 400 if > 50 or ≤ 0.
        - name: cursor
          in: query
          required: false
          schema:
            type: string
          description: >
            Opaque pagination cursor from a previous response's `nextCursor` field.
            Encoded as base64url(JSON.stringify({ lastId, lastRank })).
            Returns 400 VALIDATION_FAILED if malformed.
      responses:
        "200":
          description: Relevance-ranked search results (own non-deleted notes only)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResultPage"
              example:
                items:
                  - note:
                      id: "clxabc1234567890"
                      title: "Meeting notes"
                      body:
                        type: "doc"
                        content:
                          - type: "paragraph"
                            content:
                              - type: "text"
                                text: "Quarterly review discussion"
                      tagIds: ["clxtag1"]
                      version: 2
                      createdAt: "2026-06-01T10:00:00.000Z"
                      updatedAt: "2026-06-10T14:30:00.000Z"
                    headline: "quarterly <mark>review</mark> discussion"
                nextCursor: "eyJsYXN0SWQiOiJjbHhhYmMxMjM0NTY3ODkwIiwibGFzdFJhbmsiOjAuMDc1OX0"
        "400":
          $ref: "#/components/responses/ValidationFailed"
        "401":
          $ref: "#/components/responses/TokenInvalid"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    TipTapDocument:
      type: object
      description: TipTap JSON document (ProseMirror format)
      properties:
        type:
          type: string
          enum: [doc]
        content:
          type: array
          items:
            type: object
      required: [type, content]
      additionalProperties: true

    Note:
      type: object
      description: Full note response shape (bodyText is internal — never returned)
      required: [id, title, body, tagIds, version, createdAt, updatedAt]
      properties:
        id:
          type: string
          description: cuid
          example: clxabc1234567890
        title:
          type: string
          maxLength: 200
          example: Meeting notes
        body:
          $ref: "#/components/schemas/TipTapDocument"
        tagIds:
          type: array
          items:
            type: string
          description: cuid IDs of tags attached to this note (owned by the current user)
          example: ["clxtag1"]
        version:
          type: integer
          minimum: 1
          description: Increments by 1 on every PATCH (snapshot stored in NoteVersion)
          example: 2
        createdAt:
          type: string
          format: date-time
          description: ISO 8601 UTC
          example: "2026-06-01T10:00:00.000Z"
        updatedAt:
          type: string
          format: date-time
          description: ISO 8601 UTC
          example: "2026-06-10T14:30:00.000Z"

    SearchItem:
      type: object
      description: A single search result — note data plus a highlighted excerpt
      required: [note, headline]
      properties:
        note:
          $ref: "#/components/schemas/Note"
        headline:
          type: string
          description: >
            Plain-text excerpt generated by ts_headline. Matched tokens are
            wrapped in <mark>…</mark> tags. Up to 3 fragments, 5–15 words each.
            Derived from title + body text concatenation.
          example: "quarterly <mark>review</mark> discussion"

    SearchResultPage:
      type: object
      required: [items, nextCursor]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/SearchItem"
          description: >
            Results ordered by ts_rank DESC (highest relevance first).
            Ties broken by id ASC.
        nextCursor:
          type: string
          nullable: true
          description: >
            Opaque cursor for the next page. Encodes { lastId, lastRank }.
            null when no further results exist.
          example: "eyJsYXN0SWQiOiJjbHhhYmMxMjM0NTY3ODkwIiwibGFzdFJhbmsiOjAuMDc1OX0"

    ErrorBody:
      type: object
      required: [type, title, status, detail, code]
      properties:
        type:
          type: string
          format: uri
          example: "https://api.example.com/errors/VALIDATION_FAILED"
        title:
          type: string
          example: Validation failed
        status:
          type: integer
          example: 400
        detail:
          type: string
          example: "q must be a non-empty string"
        code:
          type: string
          example: VALIDATION_FAILED

  responses:
    ValidationFailed:
      description: >
        Request failed validation — empty q, limit out of range, or malformed cursor
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorBody"
          example:
            type: "https://api.example.com/errors/VALIDATION_FAILED"
            title: Validation failed
            status: 400
            detail: "q must be a non-empty string"
            code: VALIDATION_FAILED

    TokenInvalid:
      description: Missing or invalid access token
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorBody"
          example:
            type: "https://api.example.com/errors/AUTH_TOKEN_INVALID"
            title: Unauthorized
            status: 401
            detail: Access token is missing or expired.
            code: AUTH_TOKEN_INVALID
